<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f7f2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FE科目A">
    <meta name="description" content="基本情報技術者試験 科目Aの4択学習PWA">
    <title>FE科目A 4択トレーニング</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <main class="app-shell" aria-live="polite">
      <header class="topbar">
        <div>
          <p class="eyebrow">基本情報技術者試験</p>
          <h1>科目A 4択トレーニング</h1>
        </div>
        <div class="score-card" aria-label="学習状況">
          <span id="progressText">0 / 0</span>
          <strong id="scoreText">0問正解</strong>
        </div>
      </header>

      <section class="stats-panel" aria-label="保存された成績">
        <div>
          <span>総回答</span>
          <strong id="totalAnswersText">0問</strong>
        </div>
        <div>
          <span>累計正解</span>
          <strong id="totalCorrectText">0問</strong>
        </div>
        <div>
          <span>正答率</span>
          <strong id="accuracyText">0%</strong>
        </div>
        <button id="reviewButton" class="text-button" type="button">復習モード</button>
        <button id="resetStatsButton" class="text-button" type="button">成績をリセット</button>
      </section>

      <section class="question-panel">
        <div class="question-meta">
          <span id="categoryLabel">読み込み中</span>
          <span id="difficultyLabel">-</span>
        </div>
        <p id="questionText" class="question-text">問題データを読み込んでいます。</p>
      </section>

      <section class="choices" id="choices" aria-label="選択肢"></section>

      <section id="resultPanel" class="result-panel hidden" aria-live="assertive">
        <div class="result-heading">
          <span id="resultBadge" class="result-badge">判定</span>
          <strong id="correctAnswerText"></strong>
        </div>
        <p id="explanationText"></p>
      </section>

      <footer class="action-bar">
        <button id="resetButton" class="secondary-button" type="button">最初から</button>
        <button id="nextButton" class="primary-button" type="button" disabled>次の問題へ</button>
      </footer>
    </main>

    <script src="js/app.js" defer></script>
  </body>
</html>
